{% extends "base.html" %}

{% block content %}
<div class="game-container-2048">
    <div class="game-header-2048">
        <div class="title-section">
            <h2>2048</h2>
            <p>Join the numbers to get to the 2048 tile!</p>
        </div>
        <div class="scores-section">
            <div class="score-box">
                <span class="label">SCORE</span>
                <span id="score">0</span>
            </div>
            <div class="score-box">
                <span class="label">BEST</span>
                <span id="best-score">0</span>
            </div>
        </div>
    </div>

    <div class="game-controls">
        <button id="new-game-btn" class="btn-primary">New Game</button>
        <a href="/games" class="btn-outline">Back to Gallery</a>
    </div>

    <div class="game-board-container">
        <div id="game-board" class="game-board">
            <!-- Grid will be generated by JS -->
        </div>
        <div id="game-over" class="game-over hidden">
            <div class="message">
                <h3>Game Over!</h3>
                <button id="retry-btn" class="btn-primary">Try Again</button>
            </div>
        </div>
    </div>

    <div class="instructions card">
        <h3>How to play:</h3>
        <p>Use your <b>arrow keys</b> or <b>swipe</b> to move the tiles. When two tiles with the same number touch, they
            <b>merge into one!</b></p>
    </div>
</div>

<style>
    .game-container-2048 {
        max-width: 500px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .game-header-2048 {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
    }

    .title-section h2 {
        font-size: 3.5rem;
        font-weight: 900;
        margin: 0;
        color: var(--text);
    }

    .title-section p {
        margin: 5px 0 0;
        color: var(--text-muted);
        font-weight: 700;
    }

    .scores-section {
        display: flex;
        gap: 10px;
    }

    .score-box {
        background: var(--card);
        border: 2px solid var(--border);
        border-radius: 12px;
        padding: 10px 20px;
        min-width: 100px;
        text-align: center;
    }

    .score-box .label {
        display: block;
        font-size: 0.7rem;
        font-weight: 900;
        color: var(--text-muted);
        margin-bottom: 2px;
    }

    .score-box span:not(.label) {
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--text);
    }

    .game-controls {
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }

    .game-board-container {
        position: relative;
        background: var(--border);
        border-radius: 12px;
        padding: 15px;
        width: 100%;
        aspect-ratio: 1/1;
        box-sizing: border-box;
    }

    .game-board {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 15px;
        width: 100%;
        height: 100%;
    }

    .tile {
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 900;
        color: #fff;
        transition: all 0.1s ease-in-out;
    }

    /* Tile Colors */
    .tile-empty {
        background: rgba(255, 255, 255, 0.05);
    }

    .tile-2 {
        background: #eee4da;
        color: #776e65;
    }

    .tile-4 {
        background: #ede0c8;
        color: #776e65;
    }

    .tile-8 {
        background: #f2b179;
        color: #f9f6f2;
    }

    .tile-16 {
        background: #f59563;
        color: #f9f6f2;
    }

    .tile-32 {
        background: #f67c5f;
        color: #f9f6f2;
    }

    .tile-64 {
        background: #f65e3b;
        color: #f9f6f2;
    }

    .tile-128 {
        background: #edcf72;
        color: #f9f6f2;
        font-size: 1.8rem;
    }

    .tile-256 {
        background: #edcc61;
        color: #f9f6f2;
        font-size: 1.8rem;
    }

    .tile-512 {
        background: #edc850;
        color: #f9f6f2;
        font-size: 1.8rem;
    }

    .tile-1024 {
        background: #edc53f;
        color: #f9f6f2;
        font-size: 1.4rem;
    }

    .tile-2048 {
        background: #edc22e;
        color: #f9f6f2;
        font-size: 1.4rem;
    }

    .game-over {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        animation: fadeIn 0.5s ease;
    }

    .game-over.hidden {
        display: none;
    }

    .game-over .message {
        text-align: center;
        color: #776e65;
    }

    .game-over h3 {
        font-size: 3rem;
        font-weight: 900;
        margin-bottom: 20px;
    }

    .instructions {
        padding: 25px !important;
    }

    .instructions h3 {
        margin-top: 0;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }

        to {
            opacity: 1;
        }
    }

    @keyframes pop {
        0% {
            transform: scale(0);
        }

        100% {
            transform: scale(1);
        }
    }

    .tile-new {
        animation: pop 0.2s ease;
    }

    /* Retro Compatibility */
    body.theme-retro .game-board-container {
        background: #808080;
        border: 2px solid #fff;
        border-right-color: #000;
        border-bottom-color: #000;
        padding: 10px;
        border-radius: 0;
    }

    body.theme-retro .tile {
        border: 1px solid #000;
        border-radius: 0;
        font-family: 'Courier New', monospace;
    }

    body.theme-retro .title-section h2 {
        font-family: 'Courier New', monospace;
    }
</style>

<script>
    let board = [];
    let score = 0;
    let bestScore = localStorage.getItem('2048-best') || 0;
    const boardSize = 4;

    function initGame() {
        board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
        score = 0;
        updateScore();
        document.getElementById('best-score').innerText = bestScore;
        document.getElementById('game-over').classList.add('hidden');
        addRandomTile();
        addRandomTile();
        renderBoard();
    }

    function addRandomTile() {
        const emptyCells = [];
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (board[r][c] === 0) emptyCells.push({ r, c });
            }
        }
        if (emptyCells.length > 0) {
            const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[r][c] = Math.random() < 0.9 ? 2 : 4;
            return true;
        }
        return false;
    }

    function renderBoard() {
        const grid = document.getElementById('game-board');
        grid.innerHTML = '';
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                const value = board[r][c];
                const tile = document.createElement('div');
                tile.className = `tile ${value === 0 ? 'tile-empty' : 'tile-' + value}`;
                if (value !== 0) tile.innerText = value;
                grid.appendChild(tile);
            }
        }
    }

    function updateScore() {
        document.getElementById('score').innerText = score;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('2048-best', bestScore);
            document.getElementById('best-score').innerText = bestScore;
        }
    }

    function move(direction) {
        let moved = false;

        // 0: up, 1: right, 2: down, 3: left
        if (direction === 0) moved = moveUp();
        if (direction === 1) moved = moveRight();
        if (direction === 2) moved = moveDown();
        if (direction === 3) moved = moveLeft();

        if (moved) {
            addRandomTile();
            renderBoard();
            updateScore();
            if (isGameOver()) {
                document.getElementById('game-over').classList.remove('hidden');
            }
        }
    }

    function slide(row) {
        let arr = row.filter(val => val !== 0);
        for (let i = 0; i < arr.length - 1; i++) {
            if (arr[i] === arr[i + 1]) {
                arr[i] *= 2;
                score += arr[i];
                arr.splice(i + 1, 1);
            }
        }
        while (arr.length < boardSize) arr.push(0);
        return arr;
    }

    function moveLeft() {
        let changed = false;
        for (let r = 0; r < boardSize; r++) {
            let oldRow = [...board[r]];
            board[r] = slide(board[r]);
            if (JSON.stringify(oldRow) !== JSON.stringify(board[r])) changed = true;
        }
        return changed;
    }

    function moveRight() {
        let changed = false;
        for (let r = 0; r < boardSize; r++) {
            let oldRow = [...board[r]];
            let reversed = [...board[r]].reverse();
            let snapped = slide(reversed);
            board[r] = snapped.reverse();
            if (JSON.stringify(oldRow) !== JSON.stringify(board[r])) changed = true;
        }
        return changed;
    }

    function moveUp() {
        let changed = false;
        for (let c = 0; c < boardSize; c++) {
            let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
            let oldCol = [...col];
            let snapped = slide(col);
            for (let r = 0; r < boardSize; r++) {
                board[r][c] = snapped[r];
            }
            if (JSON.stringify(oldCol) !== JSON.stringify(snapped)) changed = true;
        }
        return changed;
    }

    function moveDown() {
        let changed = false;
        for (let c = 0; c < boardSize; c++) {
            let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
            let oldCol = [...col];
            let reversed = [...col].reverse();
            let snapped = slide(reversed);
            let finalCol = snapped.reverse();
            for (let r = 0; r < boardSize; r++) {
                board[r][c] = finalCol[r];
            }
            if (JSON.stringify(oldCol) !== JSON.stringify(finalCol)) changed = true;
        }
        return changed;
    }

    function isGameOver() {
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (board[r][c] === 0) return false;
                if (r < boardSize - 1 && board[r][c] === board[r + 1][c]) return false;
                if (c < boardSize - 1 && board[r][c] === board[r][c + 1]) return false;
            }
        }
        return true;
    }

    window.addEventListener('keydown', (e) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
            e.preventDefault();
            if (e.key === 'ArrowUp') move(0);
            if (e.key === 'ArrowRight') move(1);
            if (e.key === 'ArrowDown') move(2);
            if (e.key === 'ArrowLeft') move(3);
        }
    });

    // Touch Support
    let touchStartX = 0;
    let touchStartY = 0;
    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, false);

    document.addEventListener('touchend', e => {
        let dx = e.changedTouches[0].screenX - touchStartX;
        let dy = e.changedTouches[0].screenY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (Math.abs(dx) > 30) move(dx > 0 ? 1 : 3);
        } else {
            if (Math.abs(dy) > 30) move(dy > 0 ? 2 : 0);
        }
    }, false);

    document.getElementById('new-game-btn').onclick = initGame;
    document.getElementById('retry-btn').onclick = initGame;

    initGame();
</script>
{% endblock %}
