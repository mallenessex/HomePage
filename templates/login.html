{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to {{ node_name }}.</p>
        </div>

        {% if error %}
        <div class="auth-error" style="background:#fef2f2; color:#991b1b; border:1px solid #fca5a5; border-radius:8px; padding:12px; margin-bottom:20px; text-align:center; font-size:0.95rem;">{{ error }}</div>
        {% endif %}

        <form action="/auth/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
            </div>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="/auth/register">Join here</a></p>
        </div>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        padding: 60px 0;
    }

    .auth-card {
        max-width: 400px;
        width: 100%;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
    }

    .auth-footer {
        margin-top: 25px;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-muted);
    }
</style>
{% endblock %}
